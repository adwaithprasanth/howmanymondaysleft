<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Many Mondays Left ?</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <div class="card">
            
            <div id="input-view" class="fade-view">
                <span class="material-symbols-rounded hero-icon">
                    calendar_month
                </span>

                <h1>How many Mondays<br>do you have left ?</h1>

                <p class="subtitle">
                    Based on the average human lifespan,<br>discover how many Mondays remain.
                </p>

                <div class="input-group">
                    <input id="age" type="number" placeholder=" ">
                    <label>Your age</label>
                </div>

                <button id="calculate">
                    Reveal My Mondays
                </button>
            </div>

            <div id="result-view" class="hidden fade-view">
                <h2 id="count">0</h2>
                <span class="label">Mondays Left</span>
                <p id="message"></p>

                <button id="share-btn" class="secondary-btn">
                    <span class="material-symbols-rounded">share</span>
                    Share My Result
                </button>

                <button id="back-btn" class="ghost-btn">
                    <span class="material-symbols-rounded">arrow_back</span>
                    Recalculate
                </button>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
