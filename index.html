<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Many Mondays Left?</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <main>
        <div class="card">
            
            <div id="input-view" class="fade-view">
                <span class="material-symbols-rounded hero-icon">
                    calendar_month
                </span>

                <h1>How Many Mondays Left?</h1>

                <p class="subtitle">
                    Enter your age and discover how many Mondays you may have left.
                </p>

                <div class="input-group">
                    <input id="age" type="number" min="1" max="120" placeholder=" ">
                    <label>Your age</label>
                </div>

                <button id="calculate">
                    Calculate
                </button>
            </div>

            <div id="result-view" class="hidden fade-view">
                <h2 id="count">--</h2>
                <span class="label">Mondays Left</span>
                <p id="message"></p>

                <button id="share-btn" class="secondary-btn">
                    <span class="material-symbols-rounded">share</span>
                    Share My Result
                </button>

                <button id="back-btn" class="ghost-btn">
                    <span class="material-symbols-rounded">arrow_back</span>
                    Recalculate
                </button>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
